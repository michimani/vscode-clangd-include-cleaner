name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: npm run check

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package

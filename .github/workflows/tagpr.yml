name: tagpr

on:
  push:
    branches:
      - main

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: Songmu/tagpr@84850af451fc53753c6685a3a6a2af7beef23607 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
